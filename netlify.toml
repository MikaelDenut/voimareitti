# Voimareitti (Cyborvent Oy) - Netlify build config.
# SvelteKit 2 + @sveltejs/adapter-netlify, fully prerendered static output.
# The adapter writes the static site to build/ and an SSR fallback function to
# .netlify/functions-internal (a 404 safety net; every real route is prerendered).
[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"

# Long-lived browser caching for the static image set, which is the bulk of the
# served bytes (and therefore of Netlify bandwidth). Filenames are stable, so a
# 7-day cache cuts repeat-visit bandwidth; stale-while-revalidate keeps it fresh
# enough if a piece of art is ever re-cut under the same name.
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
